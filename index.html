<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="./css/globalstyles.css">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./css/uploadpreview.css">
  <script src="./js/index.js" defer></script>
  <script src="./js/globaljs.js" defer></script>
  <script src="./js/auth.js" defer></script>
  <script src="./js/uploadpreview.js" defer></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <img src="./images/logo.png" alt="Logo" class="logo">
    <ul class="menu">
        <li>
            <a href="../index.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M3 13h8V3H3v10zm10 8h8v-6h-8v6zM3 21h8v-6H3v6zm10-18v6h8V3h-8z" /></svg>
            Minhas Tarefas
            </a>
        </li>
        <li>
            <a href="../pages/tarefas-atribuidas.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 3h5v5h-2V6.41l-9.29 9.3-1.42-1.42 9.3-9.29H16V3zM5 5h6v2H7v10h10v-4h2v6H5V5z" /></svg>
            Tarefas atribuídas
            </a>
        </li>
        <li>
            <a href="../pages/equipe.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M16 11c1.66 0 3-1.34 3-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zM8 11c1.66 0 3-1.34 3-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5C15 14.17 10.33 13 8 13zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" /></svg>
            Equipe
            </a>
        </li>
        <li>
            <a href="../pages/configuracoes.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path d="M19.14 12.94a7.49 7.49 0 0 0 .05-.94c0-.32-.02-.63-.05-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.28 7.28 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42h-3.84a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.03.31-.05.62-.05.94s.02.63.05.94L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32c.14.24.43.34.7.22l2.39-.96c.5.4 1.05.71 1.63.94l.36 2.54c.04.24.25.42.5.42h3.84c.25 0 .46-.18.5-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96c.27.12.56.02.7-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58zM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5z" /></svg>
            Configurações
            </a>
        </li>
        </ul>

    <label class="switch">
      <input type="checkbox" id="meuSwitch">
      <span class="slider">
        <img src="../images/sun-svgrepo-com.svg" alt="Sol" class="svg sun">
        <img src="../images/moon-svgrepo-com.svg" alt="Lua" class="svg moon">
      </span>
    </label>
  </aside>

  <!-- Main -->
  <header>
    <button id="sidebar-toggle">☰</button>
    <img src="./images/cortex deitado.png" alt="Cortex deitado" id="logo-mobile">
    <div class="user-profile">
      <img src="../images/perfil.png" alt="Foto do usuário" id="userPhoto">
      <span id="userName"></span>
      <button id="logoutBtn">Sair</button>
    </div>

    <!-- Pop-up para mobile -->
    <div id="userPopup" class="user-popup">
      <div class="popup-content">
        <img src="../images/perfil.png" alt="Foto do usuário" id="popupUserPhoto">
        <span id="popupUserName"></span>
        <button id="popupLogoutBtn">Sair</button>
      </div>
    </div>

  </header>

  <main>
    <!-- Task Table -->
    <div class="search-container">
      <input type="text" placeholder="Pesquisar tarefa" id='search-input'>
      <button class="add-btn" onclick="toggleForm()">+</button>
    </div>

    <table class="task-table">
      <thead>
        <tr>
          <th>Tarefa</th>
          <th>Vencimento</th>
          <th>Status</th>
          <th>Prioridade</th>
        </tr>
      </thead>
      <tbody id="tarefas-body">
        <!-- Tarefas serão inseridas aqui dinamicamente -->
      </tbody>
    </table>


    <dialog id="formCard" class="form-card">
      <button type="button" class="close-btn" onclick="toggleForm()">×</button>
      <h3>Criar nova tarefa</h3>
      <form id="memberForm">
        <label>Nome da tarefa*</label>
        <input type="text" name="titulo" id="titulo" placeholder="Titulo" required>

        <label>Descrição</label>
        <input type="text" name="descricao" id="descricao" placeholder="Instruções da tarefa">

        <label>Data de entrega*</label>
        <input type="date" name="dataEntrega" id="dataEntrega" required>

        <label>Pontuação*</label>
        <input type="number" name="pontuacao" id="pontuacao" placeholder="Ex: 10">

        <label>Atribuir tarefa à: *</label>

        <div class="radio-option">
          <label><input type="radio" value="equipe" name="tipo_atribuicao"> Equipe</label>
          <label><input type="radio" value="individual" name="tipo_atribuicao"> Individual</label>
        </div>

        <input type="email" name="email_responsavel" id="email_responsavel" placeholder="Email do responsável">
        <select id="equipe" name="equipe">
          <option value="">Selecione uma equipe</option>
        </select>

        <label>Prioridade*</label>
        <select name="prioridade" id="prioridade" required>
          <option value="1">Baixa</option>
          <option value="2">Média</option>
          <option value="3">Alta</option>
          <option value="4">Urgente</option>
        </select>
        </br>
        </br>

        <div id="uploadArea">
          <input type="file" name="anexo" id="fileInput" multiple
            accept="image/*, video/*, audio/*, .pdf, .doc, .docx, .zip" hidden>

          <div class="upload-message">
            <span id="selectFile" class="btn-file">Anexar arquivos</span>
          </div>
          <div id="fileViewer" class="file-viewer hidden">

            <div class="viewer-content">

              <button id="closeViewer" class="viewer-close">✕</button>

              <div id="viewerBody"></div>

            </div>

          </div>
        </div>
        <div id="previewContainer" class="preview-grid"></div>

        <button type="submit" class="button">Salvar</button>
        <p id="mensagemErro"></p>
      </form>
      <div id="popupSucesso">Ação realizada com sucesso!</div>
    </dialog>

  </main>
</body>

</html>
