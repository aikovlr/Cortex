<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="./css/globalstyles.css">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./css/uploadpreview.css">
  <script src="./js/index.js" defer></script>
  <script src="./js/globaljs.js" defer></script>
  <script src="./js/auth.js" defer></script>
  <script src="./js/uploadpreview.js" defer></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>

<body>

  <!-- Sidebar -->
  <aside class="sidebar">
    <img src="./images/logo.png" alt="Logo" class="logo">
    <ul class="menu">
      <li><a href="./index.html">📋 Minhas Tarefas</a></li>
      <li><a href="./pages/equipe.html">👥 Equipe</a></li>
      <li><a href="./pages/configuracoes.html">⚙️ Configurações</a></li>
    </ul>

    <label class="switch">
      <input type="checkbox" id="meuSwitch">
      <span class="slider">
        <img src="../images/sun-svgrepo-com.svg" alt="Sol" class="svg sun">
        <img src="../images/moon-svgrepo-com.svg" alt="Lua" class="svg moon">
      </span>
    </label>
  </aside>

  <!-- Main -->
  <header>
    <button id="sidebar-toggle">☰</button>
    <img src="./images/cortex deitado.png" alt="Cortex deitado" id="logo-mobile">
    <div class="user-profile">
      <img src="../images/perfil.png" alt="Foto do usuário" id="userPhoto">
      <span id="userName"></span>
      <button id="logoutBtn">Sair</button>
    </div>

    <!-- Pop-up para mobile -->
    <div id="userPopup" class="user-popup">
      <div class="popup-content">
        <img src="../images/perfil.png" alt="Foto do usuário" id="popupUserPhoto">
        <span id="popupUserName"></span>
        <button id="popupLogoutBtn">Sair</button>
      </div>
    </div>
    
  </header>
  
  <main class="main">
    <!-- Task Table -->
    <div class="search-container">
      <input type="text" placeholder="Pesquisar tarefa" id='search-input'>
      <button class="add-btn" onclick="toggleForm()">+</button>
    </div>

    <table class="task-table">
      <thead>
        <tr>
          <th>Tarefa</th>
          <th>Vencimento</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="tarefas-body">
        <!-- Tarefas serão inseridas aqui dinamicamente -->
      </tbody>
    </table>


    <dialog id="formCard" class="form-card">
      <button type="button" class="close-btn" onclick="toggleForm()">×</button>
      <h3>Criar nova tarefa</h3>
      <form id="memberForm">
        <label>Nome da tarefa*</label>
        <input type="text" name= "titulo"id="titulo" placeholder="Titulo" required>

        <label>Descrição</label>
        <input type="text" name="descricao" id="descricao" placeholder="Instruções da tarefa">

        <label>Data de entrega*</label>
        <input type="date" name="dataEntrega" id="dataEntrega" required>

        <label>Pontuação*</label>
        <input type="number" name="pontuacao" id="pontuacao" placeholder="Ex: 10">

        <label>Atribur a: *</label>
        <input type="text" name="email_responsavel" id="email_responsavel" placeholder="exemplo@email.com" required>

        <label>Prioridade*</label>
        <select name="prioridade" id="prioridade" required>
          <option value="1">Baixa</option>
          <option value="2">Média</option>
          <option value="3">Alta</option>
          <option value="4">Urgente</option>
        </select>
        </br>
        </br>

        <div id="uploadArea">
          <input type="file" id="fileInput" multiple accept="image/*, video/*, audio/*, .pdf, .doc, .docx, .zip" hidden>

          <div class="upload-message">
            <span id="selectFile" class="btn-file">Anexar arquivos</span>
          </div>
          <div id="fileViewer" class="file-viewer hidden">

            <div class="viewer-content">

              <button id="closeViewer" class="viewer-close">✕</button>

              <div id="viewerBody"></div>

            </div>

          </div>
        </div>
        <div id="previewContainer" class="preview-grid"></div>

        <button type="submit" class="button">Salvar</button>
        <p id="mensagemErro"></p>
      </form>
      <div id="popupSucesso">Ação realizada com sucesso!</div>
    </dialog>

  </main>
</body>
</html>
