<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarefa - Cortex</title>
  <link rel="stylesheet" href="../css/globalstyles.css">
  <link rel="stylesheet" href="../css/tarefas.css">
  <link rel="stylesheet" href="../css/uploadpreview.css">
  <script src="../js/globaljs.js" defer></script>
  <script src="../js/auth.js" defer></script>
  <script src="../js/uploadpreview.js" defer></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <img src="../images/logo.png" alt="Logo" class="logo">
    <ul class="menu">
      <li><a href="../index.html">📋 Minhas Tarefas</a></li>
      <li><a href="../pages/equipe.html">👥 Equipe</a></li>
      <li><a href="../pages/configuracoes.html">⚙️ Configurações</a></li>
    </ul>

    <label class="switch">
      <input type="checkbox" id="meuSwitch">
      <span class="slider">
        <img src="../images/sun-svgrepo-com.svg" alt="Sol" class="svg sun">
        <img src="../images/moon-svgrepo-com.svg" alt="Lua" class="svg moon">
      </span>
    </label>
  </aside>

  <!-- Main -->
  <header>
    <button id="btn-back">⬅</button>
    <img src="../images/cortex deitado.png" alt="Cortex deitado" id="logo-mobile">
    <div class="user-profile">
      <img src="../images/perfil.png" alt="Foto do usuário" id="userPhoto">
      <span id="userName"></span>
      <button id="logoutBtn">Sair</button>
    </div>

    <!-- Pop-up para mobile -->
    <div id="userPopup" class="user-popup">
      <div class="popup-content">
        <img src="../images/perfil.png" alt="Foto do usuário" id="popupUserPhoto">
        <span id="popupUserName"></span>
        <button id="popupLogoutBtn">Sair</button>
      </div>
    </div>
  </header>

  <main class="main">
    <h1 id="titulo-tarefa">Carregando...</h1>
    <small id="vencimento">Aguardando data</small>

    <div class="task-box">
      <div class="task-box-content">
        <p id="descricao-tarefa"><strong>Instruções:</strong><br>Carregando descrição...</p>
      </div>

      <div class="task-box-actions">
        <div id="uploadArea">
          <input type="file" id="fileInput" multiple accept="image/*, video/*, audio/*, .pdf, .doc, .docx, .zip" hidden>

          <div class="upload-message">
            <span id="selectFile" class="btn-file">Anexar arquivos</span>
          </div>
          <div id="fileViewer" class="file-viewer hidden">

            <div class="viewer-content">

              <button id="closeViewer" class="viewer-close">✕</button>

              <div id="viewerBody"></div>

            </div>

          </div>
        </div>

        <button class="btn-primary finalizar" id="finalizar">Finalizar tarefa</button>
      </div>
    </div>

    <div id="previewContainer" class="preview-grid"></div>

    <!-- Card de report -->
    <dialog class="card" id="report">
      <button type="button" class="close-btn" onclick="toggleReport()">×</button>
      <h2 class="card-title">Ticket de reporte</h2>

      <div>
        <label for="task">Tarefa</label>
        <input type="text" id="reportTask" placeholder="Nome da tarefa" required />

        <label for="desc">Descrição</label>
        <textarea id="reportDesc" placeholder="Descreva o problema..."></textarea>
      </div>

      <button class="btn-red" type="submit">Enviar ticket</button>
    </dialog>

    <!-- Card de Sugestão-->
    <dialog class="card" id="suggestion">
      <button type="button" class="close-btn" onclick="toggleSuggestion()">×</button>
      <h2 class="card-title">Sugerir alteração</h2>

      <div>
        <label for="task">Tarefa</label>
        <input type="text" id="suggestionTask" placeholder="Nome da tarefa" required />

        <label for="desc">Sugestão</label>
        <textarea id="suggestionDesc" placeholder="Insira sua sugestão..."></textarea>
      </div>

      <button class="btn-green" type="submit">Enviar sugestão</button>
    </dialog>
    <!-- Card feedback tarefa finalizada -->

    <div class="feedback" id="feedbackContainer" style="display: none;">
      <div class="feedback-card-styling">
        <h2 class="card-title">Feedback</h2>
        <div>
          <label for="feedbackDesc">Descrição</label>
          <input type='text' id="feedbackDesc" placeholder="Insira o feedback..." required />
        </div>
        <button class="btn-green" id="sendFeedback" type="submit">Enviar feedback</button>
      </div>
    </div>

    <!-- botões de rodapé (fora do box) -->
    <div class="footer-buttons">
      <button class="btn-red" onclick="toggleReport()">Reportar tarefa</button>
      <button class="btn-green" id="sugestao" onclick="toggleSuggestion()">Sugerir alteração</button>
    </div>

    <div id="popupSucesso">Ação realizada com sucesso!</div>

  </main>
  <script src="../js/tarefa.js" defer></script>
</body>

</html>
