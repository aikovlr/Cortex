<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipe - Cortex</title>
  <link rel="stylesheet" href="../css/globalstyles.css">
  <link rel="stylesheet" href="../css/equipe.css">
  <script src="../js/detalhesEquipe.js" defer></script>
  <script src="../js/globaljs.js" defer></script>
  <script src="../js/auth.js" defer></script>
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <img src="../images/logo.png" alt="Logo" class="logo">
    <ul class="menu">
      <li><a href="../index.html">📋 Minhas Tarefas</a></li>
      <li><a href="../pages/equipe.html">👥 Equipe</a></li>
      <li><a href="../pages/configuracoes.html">⚙️ Configurações</a></li>
    </ul>

    <label class="switch">
      <input type="checkbox" id="meuSwitch">
      <span class="slider">
        <img src="../images/sun-svgrepo-com.svg" alt="Sol" class="svg sun">
        <img src="../images/moon-svgrepo-com.svg" alt="Lua" class="svg moon">
      </span>
    </label>
  </aside>

  <!-- Main -->
  <header>
    <button id="btn-back">⬅</button>
    <img src="../images/cortex deitado.png" alt="Cortex deitado" id="logo-mobile">
    <div class="user-profile">
      <img src="../images/perfil.png" alt="Foto do usuário" id="userPhoto">
      <span id="userName"></span>
      <button id="logoutBtn">Sair</button>
    </div>

    <!-- Pop-up para mobile -->
    <div id="userPopup" class="user-popup">
      <div class="popup-content">
        <img src="../images/perfil.png" alt="Foto do usuário" id="popupUserPhoto">
        <span id="popupUserName"></span>
        <button id="popupLogoutBtn">Sair</button>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Barra de busca -->
    <div class="search-container">
      <input type="text" placeholder="Pesquisar integrante" id='search-input'>
      <button class="add-btn" onclick="toggleForm()">+</button>
    </div>

    <!-- Tabela de equipe -->
    <table id="teamTable">
      <thead>
        <tr>
          <th>Integrante</th>
          <th>Desde</th>
          <th>Tarefas atribuídas</th>
          <th>Cargo</th>
        </tr>
      </thead>
      <tbody id="membros-body">
        <!-- Membros serão inseridos aqui dinamicamente -->
      </tbody>
    </table>

    <!-- Card de cadastro (escondido inicialmente) -->
    <dialog id="formCard" class="form-card">
      <button type="button" class="close-btn" onclick="toggleForm()">×</button>
      <h3>Adicionar membro</h3>
      <form id="memberForm">
        <label>Email</label>
        <input type="email" name="email" id="email" required>

        <label>Adicionar como administrador?</label>
        <input type="checkbox" name="isAdmin" id="isAdmin">Sim
      </br>
        <button type="submit" class="button">Salvar</button>
        <p id="mensagemErro"></p>
      </form>
    </dialog>
  </main>

  <div id="popupSucesso">Membro cadastrado com sucesso!</div>

</body>
</html>
